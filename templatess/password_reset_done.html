<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Sent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
        }
        .reset-sent-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
        }
        .reset-sent-container h2 {
            color: #d32f2f;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .reset-sent-container p {
            color: #333;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .reset-sent-container .btn-primary {
            background-color: #d32f2f;
            border: none;
        }
        .reset-sent-container .btn-primary:hover {
            background-color: #b71c1c;
        }
    </style>
</head>

<body>
    <div class="reset-sent-container">
        <h2>Password Reset Sent</h2>
        <p>We've emailed you instructions for setting your password. If you don't receive an email, please check your spam folder.</p>
        <a href="/login" class="btn btn-primary">Back to Login</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
