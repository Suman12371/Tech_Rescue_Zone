<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
        }
        .forgot-password-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        .forgot-password-container h2 {
            color: #d32f2f;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .forgot-password-container .btn-primary {
            background-color: #d32f2f;
            border: none;
        }
        .forgot-password-container .btn-primary:hover {
            background-color: #b71c1c;
        }
        .form-text {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .forgot-password-container .alert {
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="forgot-password-container">
        {% if messages %}
        {% for message in messages %}
            <div class="alert {% if message.tags %}alert-{{ message.tags }}{% else %}alert-info{% endif %}" role="alert">
                {{ message }}
            </div>
        {% endfor %}
        {% endif %}
        <h2>Forgot Password</h2>
        <p class="form-text text-center">Enter your email address to receive a password reset link.</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.email.label_tag }}
                {{ form.email }}
            </div>
            <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
