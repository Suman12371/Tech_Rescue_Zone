<body>
    <div class="login-container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if message.tags %}alert-{{ message.tags }}{% else %}alert-info{% endif %}" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <h1 class="login-title">Change your Password</h1>
        <form method="post" action="">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_new_password" class="form-label">New Password</label>
                <input type="password" name="new_password" class="form-control" id="id_new_password" required>
            </div>
            <div class="mb-3">
                <label for="id_confirm_password" class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" id="id_confirm_password" required>
            </div>
            <button type="submit" class="btn btn-danger w-100">Change Password</button>
        </form>
        <div class="text-center mt-3">
            <p>Remembered your password? <a href="{% url 'login' %}" class="text-danger">Login</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
