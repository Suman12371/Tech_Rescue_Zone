<body>
    <div class="login-container">
        <h1 class="login-title">Login</h1>
        <form method="post" action="{% url 'TechRescueZoneApp:login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label">{{ form.username.label }}</label>
                <input type="text" name="username" class="form-control" id="id_username">
            </div>
            <div class="mb-3">
                <label for="id_password" class="form-label">{{ form.password.label }}</label>
                <input type="password" name="password" class="form-control" id="id_password">
            </div>
            <button type="submit" class="btn btn-danger w-100">Login</button>
        </form>
        <div class="text-center mt-3">
            <p>Don’t have an account? <a href="/register/" class="text-danger">Register</a></p>
        </div>
        <button class="btn google-btn w-100 mt-2">Sign in with Google</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
