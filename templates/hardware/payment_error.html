{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card shadow border-danger">
                <div class="card-header bg-danger text-white">
                    <h3 class="mb-0">Payment Error</h3>
                </div>
                <div class="card-body text-center py-5">
                    <div class="mb-4">
                        <i class="fas fa-exclamation-triangle text-danger" style="font-size: 5rem;"></i>
                    </div>
                    <h4 class="mb-3">An error occurred during payment processing</h4>
                    <p class="mb-4">{{ error }}</p>
                    
                    <div class="alert alert-secondary" role="alert">
                        <p class="mb-0">If you believe this is an error, please contact our support team.</p>
                    </div>
                </div>
                <div class="card-footer">
                    <div class="d-flex justify-content-center">
                        <a href="{% url 'TechRescueZoneApp:hardware_list' %}" class="btn btn-primary me-3">
                            <i class="fas fa-shopping-bag me-2"></i>Back to Products
                        </a>
                        <a href="#" class="btn btn-outline-secondary">
                            <i class="fas fa-headset me-2"></i>Contact Support
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
