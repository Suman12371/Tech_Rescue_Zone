<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Adjust alignment to allow margin */
            height: 100vh;
            margin: 0;
            padding-top: 50px; /* Add space at the top */
        }
        .register-container {
            background-color: #1e1e1e;
            border: 2px solid red;
            border-radius: 10px;
            padding: 20px;
            width: 100%;
            max-width: 600px; /* Increased maximum width */
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
            color: white;
        }

        .register-title {
            color: red;
            text-align: center;
            margin-bottom: 20px;
        }
        .form-label {
            color: white;
        }
        .signin-link a {
            color: red;
            text-decoration: none;
        }
        .google-btn {
            background-color: #333;
            color: white;
        }
        .google-btn:hover {
            background-color: #555;
        }


    </style>
</head>
<body>
    <div class="register-container">
        <h1 class="register-title">Register as Export</h1>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label">Username</label>
                <input type="text" name="username" class="form-control" id="id_username" placeholder="Enter your username" required>
            </div>
            <div class="mb-3">
                <label for="id_email" class="form-label">Email</label>
                <input type="email" name="email" class="form-control" id="id_email" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label for="id_password1" class="form-label">Password</label>
                <input type="password" name="password1" class="form-control" id="id_password1" placeholder="Enter your password" required>
            </div>
            <div class="mb-3">
                <label for="id_password2" class="form-label">Confirm Password</label>
                <input type="password" name="password2" class="form-control" id="id_password2"placeholder="Re-enter your password" required>
            </div>

            <div class="mb-3">
                <label for="status" class="form-label">Status</label>
                <select class="form-select" id="status">
                    <option selected>Export</option>
                    <option>User</option>
                </select>
            </div>
            <button type="submit" class="btn btn-danger w-100">Register</button>
        </form>
        <div class="text-center mt-3 signin-link">
            <p>Already have an account? <a href="{% url 'login' %}">Sign In</a></p>
        </div>
        <button class="btn google-btn w-100">Sign in with Google</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
